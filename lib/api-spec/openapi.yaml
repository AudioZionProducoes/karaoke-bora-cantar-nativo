openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Karaoke CT API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: musicas
    description: Song catalog operations
  - name: users
    description: User management operations
  - name: access-codes
    description: Temporary access code operations
  - name: webhook
    description: Webhook integrations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /musicas/search:
    get:
      operationId: searchMusicas
      tags: [musicas]
      summary: Search songs
      description: Real-time search across artista, musica, and inicio fields with pagination
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Page number (1-based)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 24
          description: Results per page
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicaSearchResult"

  /musicas/sync-videos:
    post:
      operationId: syncVideos
      tags: [musicas]
      summary: Sync available videos
      description: Mark which music IDs have corresponding video files available (from local folder or Bunny Stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: Sync completed
          content:
            application/json:
              schema:
                type: object
                required: [synced, cleared]
                properties:
                  synced:
                    type: integer
                  cleared:
                    type: integer

  /musicas/sync-bunny:
    post:
      operationId: syncBunny
      tags: [musicas]
      summary: Sync with Bunny Stream
      description: Fetch all videos from Bunny Stream library and mark corresponding songs as having video
      responses:
        "200":
          description: Sync completed
          content:
            application/json:
              schema:
                type: object
                required: [synced, cleared, totalVideos, matched]
                properties:
                  synced:
                    type: integer
                  cleared:
                    type: integer
                  totalVideos:
                    type: integer
                  matched:
                    type: integer
        "503":
          description: Bunny credentials not configured

  /musicas/stats:
    get:
      operationId: getMusicasStats
      tags: [musicas]
      summary: Catalog statistics
      description: Returns total songs count and unique artists count
      responses:
        "200":
          description: Catalog stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogStats"

  /musicas:
    post:
      operationId: createMusica
      tags: [musicas]
      summary: Add a song
      description: Add a new song to the catalog (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MusicaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Musica"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: ID already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /musicas/{id}:
    get:
      operationId: getMusica
      tags: [musicas]
      summary: Get a song by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Song found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Musica"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMusica
      tags: [musicas]
      summary: Update a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MusicaUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Musica"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMusica
      tags: [musicas]
      summary: Delete a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List subscribers
      description: List all active subscribers (admin)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KaraokeUser"

  /users/login:
    post:
      operationId: authenticateUser
      tags: [users]
      summary: Login with email and password
      description: Authenticates a subscriber. Rotates session token for single-device policy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  id:
                    type: integer
                  email:
                    type: string
                  subscriptionStatus:
                    type: string
                  accessGranted:
                    type: boolean
                  accessGrantedAt:
                    type: string
                    nullable: true
                  expiresAt:
                    type: string
                    nullable: true
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/logout:
    post:
      operationId: userLogout
      tags: [users]
      summary: Logout
      description: Clears active session token on the server.
      parameters:
        - name: X-Auth-Token
          in: header
          schema:
            type: string
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /users/me:
    get:
      operationId: getAuthenticatedUser
      tags: [users]
      summary: Get current authenticated user
      parameters:
        - name: X-Auth-Token
          in: header
          schema:
            type: string
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KaraokeUser"
        "401":
          description: Not authenticated

  /users/{id}/revoke:
    post:
      operationId: revokeUserAccess
      tags: [users]
      summary: Revoke user access
      description: Immediately revoke a user's karaoke access and clear session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Access revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KaraokeUser"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/generate-password:
    post:
      operationId: createUserPassword
      tags: [users]
      summary: Generate temporary password
      description: Generates a new temporary 8-digit password for a subscriber
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Password generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  email:
                    type: string
                  temporaryPassword:
                    type: string
                  message:
                    type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /access-codes:
    get:
      operationId: listAccessCodes
      tags: [access-codes]
      summary: List access codes
      description: Returns all generated access codes with their status
      responses:
        "200":
          description: List of access codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessCode"
    post:
      operationId: createAccessCodes
      tags: [access-codes]
      summary: Generate access codes
      description: Generates one or more temporary access codes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [durationMinutes]
              properties:
                durationMinutes:
                  type: integer
                  description: Access duration in minutes
                quantity:
                  type: integer
                  default: 1
                  description: Number of codes to generate (max 50)
                label:
                  type: string
                  description: Optional label/description
                createdBy:
                  type: integer
                  description: Admin user ID
                validityType:
                  type: string
                  enum: [never, scheduled]
                  default: never
                  description: When the code itself expires (before redeem)
                codeExpiresAt:
                  type: string
                  description: ISO datetime when the code expires (only for scheduled validity)
      responses:
        "201":
          description: Codes generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  codes:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                        durationMinutes:
                          type: integer
                        label:
                          type: string
                          nullable: true
                        expiresAt:
                          type: string

  /access-codes/{code}/redeem:
    post:
      operationId: redeemAccessCode
      tags: [access-codes]
      summary: Redeem access code
      description: Redeems a code to grant temporary access
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, whatsapp]
              properties:
                name:
                  type: string
                  description: Full name of the person redeeming
                email:
                  type: string
                  description: Email address for contact
                whatsapp:
                  type: string
                  description: WhatsApp number for contact
      responses:
        "200":
          description: Code redeemed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  durationMinutes:
                    type: integer
                  accessExpiresAt:
                    type: string
        "404":
          description: Code not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Code expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /access-codes/validate:
    get:
      operationId: validateAccessCode
      tags: [access-codes]
      summary: Validate redeemed code
      description: Checks if a redeemed code is still valid
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  remainingMinutes:
                    type: integer
                  durationMinutes:
                    type: integer
                  accessExpiresAt:
                    type: string

  /webhook/woocommerce:
    post:
      operationId: woocommerceWebhook
      tags: [webhook]
      summary: WooCommerce subscription webhook
      description: Handles subscription purchase, renewal, and cancellation events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WooCommerceEvent"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Musica:
      type: object
      required: [id, artista, musica, inicio]
      properties:
        id:
          type: integer
        artista:
          type: string
        musica:
          type: string
        inicio:
          type: ["string", "null"]
        hasVideo:
          type: boolean

    MusicaInput:
      type: object
      required: [id, artista, musica]
      properties:
        id:
          type: integer
        artista:
          type: string
          minLength: 1
        musica:
          type: string
          minLength: 1
        inicio:
          type: string
        hasVideo:
          type: boolean

    MusicaUpdate:
      type: object
      properties:
        artista:
          type: string
          minLength: 1
        musica:
          type: string
          minLength: 1
        inicio:
          type: string
        hasVideo:
          type: boolean

    MusicaSearchResult:
      type: object
      required: [data, total, page, limit, totalPages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Musica"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    CatalogStats:
      type: object
      required: [totalSongs, totalArtists]
      properties:
        totalSongs:
          type: integer
        totalArtists:
          type: integer

    KaraokeUser:
      type: object
      required: [id, email, subscriptionStatus, accessGranted, hasPassword, hasActiveSession]
      properties:
        id:
          type: integer
        email:
          type: string
        subscriptionStatus:
          type: string
          enum: [active, cancelled, expired]
        accessGranted:
          type: boolean
        accessGrantedAt:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
        hasPassword:
          type: boolean
        hasActiveSession:
          type: boolean

    WooCommerceEvent:
      type: object
      required: [event]
      properties:
        event:
          type: string
        customer_id:
          type: ["string", "null"]
        customer_email:
          type: ["string", "null"]
        subscription_status:
          type: ["string", "null"]
        order_id:
          type: ["string", "null"]

    WebhookResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    AccessCode:
      type: object
      required: [id, code, durationMinutes, used, status]
      properties:
        id:
          type: integer
        code:
          type: string
        durationMinutes:
          type: integer
        label:
          type: ["string", "null"]
        used:
          type: boolean
        usedAt:
          type: ["string", "null"]
        usedBy:
          type: ["string", "null"]
        redeemerName:
          type: ["string", "null"]
        redeemerEmail:
          type: ["string", "null"]
        redeemerWhatsapp:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
        validityType:
          type: string
          enum: [never, scheduled]
          description: When the code itself expires (before redeem)
        codeExpiresAt:
          type: ["string", "null"]
          description: ISO datetime when the code expires (only for scheduled validity)
        createdAt:
          type: ["string", "null"]
        createdBy:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, used, expired]
        remainingMinutes:
          type: ["integer", "null"]
          description: Minutes left for used (not expired) codes. Null for pending.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
